<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hamburger Menu Demos</title>
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/layout.css" />
    <link rel="stylesheet" href="styles/controls.css" />
    <link rel="stylesheet" href="styles/menu.css" />
    <style>
      .demo-sections {
        display: grid;
        gap: 24px;
        max-width: 720px;
        padding-block-end: 48px;
        padding-inline: 24px;
      }

      .demo-section,
      .demo-group {
        display: grid;
        gap: 12px;
      }

      .demo-section h2,
      .demo-group h3 {
        margin: 0;
      }

      .demo-section h2 {
        font-size: 1.5rem;
      }

      .demo-group h3 {
        font-size: 1rem;
      }

      .demo-list {
        display: grid;
        gap: 8px;

        a {
          display: block;
          padding: 16px;
          border: 1px solid var(--line);
          border-radius: 8px;
          background: var(--surface);
          transition:
            background-color 0.2s,
            border-color 0.2s;

          &:hover {
            background-color: var(--bg);
            border-color: var(--text);
          }
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html">Menu Demos</a>
    </header>

    <main>
      <section class="hero">
        <h1>Hamburger menu demos.</h1>
      </section>

      <div class="demo-sections">
        <section class="demo-section">
          <h2>How the menu opens</h2>

          <div class="demo-group">
            <h3>Page overlay</h3>
            <nav class="demo-list">
              <a href="1_opening_fullscreen.html">Fullscreen</a>
              <a href="2_opening_drawer.html">Drawer</a>
            </nav>
          </div>
        </section>

        <section class="demo-section">
          <h2>Inside the menu</h2>
          <nav class="demo-list">
            <a href="3_content_accordion.html">Accordion</a>
            <a href="4_content_extras.html">Search, contact, SNS</a>
          </nav>
        </section>

        <section class="demo-section">
          <h2>Popover</h2>
          <div class="demo-group">
            <nav class="demo-list">
              <a href="10_opening_compact.html">Compact</a>
              <a href="11_opening_header_dropdown.html">Header dropdown</a>
            </nav>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
