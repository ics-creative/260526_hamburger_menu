<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Drawer Menu</title>
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/layout.css" />
    <link rel="stylesheet" href="styles/controls.css" />
    <link rel="stylesheet" href="styles/menu.css" />
    <link rel="stylesheet" href="styles/menu-drawer.css" />
    <script src="scripts/menu.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#">Example Website</a>
      <!-- ハンバーガーメニューボタン -->
      <!-- Hamburger menu button -->
      <button id="button-open" class="button-icon button-menu" title="Menu"></button>
    </header>

    <main>
      <section class="hero">
        <h1>Drawer Menu</h1>
        <p>A drawer menu that opens from the screen edge.</p>
        <a href="index.html">Back to Index</a>
      </section>

      <!-- スクロール検証用の長い本文 -->
      <!-- Tall content for scroll checks -->
      <div class="scroll-test-space"></div>

      <footer class="demo-footer">
        <small>&copy; 2026 ICS INC.</small>
      </footer>
    </main>

    <!-- ドロワー型ハンバーガーメニュー本体 -->
    <!-- Drawer hamburger menu panel -->
    <dialog id="menu" class="menu-dialog menu-drawer">
      <header class="menu-header">
        <button id="button-close" class="button-icon button-close" title="Close"></button>
      </header>

      <nav class="menu-list">
        <a href="#">Work</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
      </nav>
    </dialog>
  </body>
</html>
