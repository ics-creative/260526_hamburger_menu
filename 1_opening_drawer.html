<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Opening Pattern: Drawer</title>
    <link rel="stylesheet" href="common/base.css" />
    <link rel="stylesheet" href="common/layout.css" />
    <link rel="stylesheet" href="common/controls.css" />
    <link rel="stylesheet" href="common/menu.css" />
    <link rel="stylesheet" href="common/drawer.css" />
    <script src="menu.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#work">Example Website</a>
      <a class="demo-index-link" href="index.html">Demos</a>
      <!-- Regular links are kept for larger screens. -->
      <nav class="site-nav">
        <a href="#work">Work</a>
        <a href="#services">Services</a>
        <a href="#contact">Contact</a>
      </nav>
      <button class="button-icon button-menu" commandfor="drawer" command="show-modal" title="Open menu"></button>
    </header>

    <main>
      <section class="hero" id="work">
        <p>Independent studio</p>
        <h1>Quiet websites for focused teams.</h1>
        <a href="#contact">Start a project</a>
      </section>

      <section class="summary" id="services">
        <h2>Services</h2>
        <p>Design systems, product websites, and fast front-end prototypes.</p>
      </section>

      <section class="summary" id="contact">
        <h2>Contact</h2>
        <p>Share the project outline through the contact page.</p>
      </section>
    </main>

    <!-- The dialog is the actual hamburger menu panel. -->
    <dialog class="menu-dialog side-menu" id="drawer" closedby="any">
      <header class="menu-header">
        <button class="button-icon button-close" commandfor="drawer" command="close" title="Close menu"></button>
      </header>

      <!-- Menu items are links because they navigate on the page. -->
      <nav class="menu-list">
        <a href="#work">Work</a>
        <a href="#services">Services</a>
        <a href="#contact">Contact</a>
      </nav>
    </dialog>
  </body>
</html>
