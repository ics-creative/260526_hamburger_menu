<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Opening Pattern: Compact</title>
    <link rel="stylesheet" href="base.css" />
    <link rel="stylesheet" href="styles.css" />
    <script src="menu.js" defer></script>
    <style>
      .compact-menu {
        /* Compact menus behave like a small popover. */
        inset: 88px 24px auto auto;
        width: 288px;
        padding: 8px;
        border-radius: 8px;
        box-shadow:
          0 16px 40px rgb(32 32 32 / 10%),
          inset 0 0 0 1px var(--line);
        opacity: 0;
        translate: 0 -8px;

        @media (width <= 436px) {
          inset: 88px 24px auto;
          width: auto;
        }

        &:popover-open {
          @starting-style {
            opacity: 0;
            translate: 0 -8px;
          }
        }

        &::backdrop {
          background: transparent;
        }

        .menu-list {
          gap: 4px;
        }

        .menu-list > a {
          /* Equal padding keeps the small menu balanced. */
          min-height: 0;
          padding: 12px;
          line-height: 1.25;
        }
      }

      .compact-menu:popover-open {
        opacity: 1;
        translate: 0 0;
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#intro">Little Press</a>
      <nav class="site-nav">
        <a href="#intro">Intro</a>
        <a href="#issues">Issues</a>
        <a href="#contact">Contact</a>
      </nav>
      <button class="icon-button menu-button" popovertarget="compact" title="Open menu">
        <span class="visually-hidden">Open menu</span>
      </button>
    </header>

    <main>
      <section class="hero" id="intro">
        <p>Small publication</p>
        <h1>A compact menu for simple pages.</h1>
        <a href="#issues">Read issues</a>
      </section>

      <section class="summary" id="issues">
        <h2>Issues</h2>
        <p>Short essays, interviews, and notes from independent makers.</p>
      </section>

      <section class="summary" id="contact">
        <h2>Contact</h2>
        <p>Send a note through the contact page.</p>
      </section>
    </main>

    <!-- No close button here; links, Esc, or outside clicks close it. -->
    <div class="menu-dialog compact-menu" id="compact" popover>
      <nav class="menu-list">
        <a href="#intro">Intro</a>
        <a href="#issues">Issues</a>
        <a href="#contact">Contact</a>
      </nav>
    </div>
  </body>
</html>
