<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Opening Pattern: Drawer</title>
    <link rel="stylesheet" href="common/base.css" />
    <link rel="stylesheet" href="common/layout.css" />
    <link rel="stylesheet" href="common/controls.css" />
    <link rel="stylesheet" href="common/menu.css" />
    <link rel="stylesheet" href="common/drawer.css" />
    <script src="drawer-menu.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#work">Example Website</a>
      <a class="demo-index-link" href="index.html">Demos</a>
      <nav class="site-nav">
        <a href="#work">Work</a>
        <a href="#services">Services</a>
        <a href="#contact">Contact</a>
      </nav>
      <!-- ハンバーガーメニューボタン -->
      <!-- Hamburger menu button -->
      <button class="button-icon button-menu" id="drawer-open" title="Open menu"></button>
    </header>

    <main>
      <section class="hero" id="work">
        <p>Independent studio</p>
        <h1>Quiet websites for focused teams.</h1>
        <a href="#contact">Start a project</a>
      </section>

      <section class="summary" id="services">
        <h2>Services</h2>
        <p>Design systems, product websites, and fast front-end prototypes.</p>
      </section>

      <section class="summary" id="contact">
        <h2>Contact</h2>
        <p>Share the project outline through the contact page.</p>
      </section>

      <!-- スクロール検証用の長い本文 -->
      <!-- Tall content for scroll checks -->
      <div class="scroll-test-space"></div>
    </main>

    <!-- ドロワー型ハンバーガーメニュー本体 -->
    <!-- Drawer-style hamburger menu panel -->
    <dialog class="menu-dialog side-menu" id="drawer">
      <header class="menu-header">
        <button class="button-icon button-close" id="drawer-close" title="Close menu"></button>
      </header>

      <nav class="menu-list">
        <a href="#work">Work</a>
        <a href="#services">Services</a>
        <a href="#contact">Contact</a>
      </nav>
    </dialog>
  </body>
</html>
