<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Compact Menu</title>
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/layout.css" />
    <link rel="stylesheet" href="styles/controls.css" />
    <link rel="stylesheet" href="styles/menu.css" />
    <link rel="stylesheet" href="styles/menu-compact.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#">Example Website</a>
      <!-- ハンバーガーメニューボタン -->
      <!-- Hamburger menu button -->
      <button class="button-icon button-menu" popovertarget="menu-compact" title="Menu"></button>
    </header>

    <main>
      <section class="hero">
        <h1>Compact Menu</h1>
        <p>A compact navigation menu displayed as a small popover.</p>
        <a href="index.html">Back to Index</a>
      </section>

      <!-- スクロール検証用の長い本文 -->
      <!-- Tall content for scroll checks -->
      <div class="scroll-test-space"></div>

      <footer class="demo-footer">
        <small>&copy; 2026 ICS INC.</small>
      </footer>
    </main>

    <!-- コンパクト型ハンバーガーメニュー本体 -->
    <!-- Compact hamburger menu panel -->
    <div id="menu-compact" class="menu-dialog menu-compact" popover>
      <nav class="menu-list">
        <a href="#">Intro</a>
        <a href="#">Issues</a>
        <a href="#">Contact</a>
      </nav>
    </div>

    <script>
      // メニュー内リンク選択時のpopoverクローズ
      // Close the popover when a menu link is selected.
      const menu = document.querySelector("#menu-compact");

      for (const link of menu.querySelectorAll("a[href]")) {
        link.addEventListener("click", () => {
          menu.hidePopover();
        });
      }
    </script>
  </body>
</html>
