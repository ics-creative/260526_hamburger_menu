<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Search Form Menu</title>
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/layout.css" />
    <link rel="stylesheet" href="styles/controls.css" />
    <link rel="stylesheet" href="styles/menu.css" />
    <link rel="stylesheet" href="styles/menu-fullscreen.css" />
    <link rel="stylesheet" href="styles/menu-extras.css" />
    <script src="scripts/menu.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#">Example Website</a>
      <a class="demo-index-link" href="index.html">Demos</a>
      <!-- ハンバーガーメニューボタン -->
      <!-- Hamburger menu button -->
      <button class="button-icon button-menu" id="button-open" title="Open menu"></button>
    </header>

    <main>
      <section class="hero">
        <p>Content pattern</p>
        <h1>Search and Contact Menu</h1>
        <a href="#">Demo</a>
      </section>

      <section class="summary">
        <h2>Pricing</h2>
        <p>Plan list.</p>
      </section>

      <section class="summary">
        <h2>Demo</h2>
        <p>Demo request page.</p>
      </section>

      <!-- スクロール検証用の長い本文 -->
      <!-- Tall content for scroll checks -->
      <div class="scroll-test-space"></div>
    </main>

    <!-- 検索付きハンバーガーメニュー本体 -->
    <!-- Search hamburger menu panel -->
    <dialog class="menu-dialog full-menu extras-menu" id="menu">
      <header class="menu-header">
        <button class="button-icon button-close" id="button-close" title="Close menu"></button>
      </header>

      <form class="menu-search" action="#">
        <label for="menu-search">Search</label>
        <input id="menu-search" type="search" name="q" placeholder="Search docs" />
      </form>

      <nav class="menu-list large-menu-list extras-list">
        <a href="#">Platform</a>
        <a href="#">Pricing</a>
        <a href="#">Demo</a>
      </nav>

      <div class="extras-panel">
        <div class="extras-actions">
          <a class="action-button" href="#">Contact</a>
          <a class="action-button" href="#">Download</a>
        </div>

        <div class="social-links">
          <a class="social-link" href="#">
            <img src="assets/icon-linkedin.svg" alt="LinkedIn" />
          </a>
          <a class="social-link" href="#">
            <img src="assets/icon-x.svg" alt="X" />
          </a>
        </div>
      </div>
    </dialog>
  </body>
</html>
