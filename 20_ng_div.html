<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NG Div Fullscreen Menu</title>
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/layout.css" />
    <link rel="stylesheet" href="styles/controls.css" />
    <style>
      .menu-ng-fullscreen {
        position: fixed;
        z-index: 2;
        inset: 0;
        display: none;
        grid-template-rows: var(--site-header-height) minmax(0, 1fr);
        width: 100vw;
        inline-size: 100vw;
        height: 100vh;
        block-size: 100dvh;
        overflow-y: auto;
        padding-inline: 24px;
        background: var(--surface);

        &.is-open {
          display: grid;
        }

        .menu-header {
          display: flex;
          align-items: center;
          justify-content: flex-end;
          min-height: var(--site-header-height);
        }

        .menu-fullscreen-nav {
          counter-reset: fullscreen-item;
          display: grid;
          align-content: start;
          gap: 0;
          padding-block: 24px;

          a {
            counter-increment: fullscreen-item;
            display: grid;
            grid-template-columns: 3rem minmax(0, 1fr);
            align-items: baseline;
            gap: 24px;
            padding-block: 16px;
            border-bottom: 1px solid var(--line);
            font-size: 5rem;
            font-weight: bold;
            line-height: 1;
            transition:
              background-color 0.2s,
              padding-inline 0.2s;

            &::before {
              content: counter(fullscreen-item, decimal-leading-zero);
              font-size: 1rem;
              line-height: 1;
            }

            @media (any-hover: hover) {
              &:hover {
                background-color: var(--bg);
                padding-inline: 16px;
              }
            }

            @media (width <= 720px) {
              grid-template-columns: 2rem minmax(0, 1fr);
              gap: 16px;
              font-size: 3rem;
            }
          }
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#">Example Website</a>
      <button id="button-open" class="button-icon button-menu" type="button" title="Menu"></button>
    </header>

    <main>
      <section class="hero">
        <h1>Class-toggled div menu</h1>
        <p>An anti-pattern that toggles menu state only by changing classes.</p>
        <a href="index.html">Back to Index</a>
        <a href="#">Background link</a>
      </section>

      <div class="scroll-test-space"></div>

      <footer class="demo-footer">
        <small>&copy; 2026 ICS INC.</small>
      </footer>
    </main>

    <!-- NG: state is controlled only by adding and removing a class on a div. -->
    <div id="menu" class="menu-ng-fullscreen">
      <header class="menu-header">
        <button id="button-close" class="button-icon button-close" type="button" title="Close"></button>
      </header>

      <nav class="menu-fullscreen-nav">
        <a href="#"><span>Work</span></a>
        <a href="#"><span>Studio</span></a>
        <a href="#"><span>Services</span></a>
        <a href="#"><span>Contact</span></a>
      </nav>
    </div>

    <script>
      const buttonOpen = document.querySelector("#button-open");
      const buttonClose = document.querySelector("#button-close");
      const menu = document.querySelector("#menu");

      buttonOpen.addEventListener("click", () => {
        menu.classList.add("is-open");
      });

      buttonClose.addEventListener("click", () => {
        menu.classList.remove("is-open");
      });
    </script>
  </body>
</html>
