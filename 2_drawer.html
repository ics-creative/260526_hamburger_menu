<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Drawer Menu</title>
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/layout.css" />
    <link rel="stylesheet" href="styles/controls.css" />
    <link rel="stylesheet" href="styles/menu.css" />
    <link rel="stylesheet" href="styles/menu-drawer.css" />
    <script src="scripts/menu.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#">Example Website</a>
      <a class="demo-index-link" href="index.html">Demos</a>
      <!-- ハンバーガーメニューボタン -->
      <!-- Hamburger menu button -->
      <button class="button-icon button-menu" id="button-open" title="Open menu"></button>
    </header>

    <main>
      <section class="hero">
        <p>Menu pattern</p>
        <h1>Drawer Menu</h1>
        <a href="#">Contact</a>
      </section>

      <section class="summary">
        <h2>Services</h2>
        <p>Service list.</p>
      </section>

      <section class="summary">
        <h2>Contact</h2>
        <p>Contact details.</p>
      </section>

      <!-- スクロール検証用の長い本文 -->
      <!-- Tall content for scroll checks -->
      <div class="scroll-test-space"></div>
    </main>

    <!-- ドロワー型ハンバーガーメニュー本体 -->
    <!-- Drawer-style hamburger menu panel -->
    <dialog class="menu-dialog side-menu" id="menu">
      <header class="menu-header">
        <button class="button-icon button-close" id="button-close" title="Close menu"></button>
      </header>

      <nav class="menu-list">
        <a href="#">Work</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
      </nav>
    </dialog>
  </body>
</html>
