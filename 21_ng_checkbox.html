<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NG Checkbox Fullscreen Menu</title>
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/layout.css" />
    <link rel="stylesheet" href="styles/controls.css" />
    <style>
      .menu-toggle {
        position: absolute;
        inline-size: 1px;
        block-size: 1px;
        overflow: hidden;
        opacity: 0;
      }

      .menu-toggle:focus-visible + .site-header .button-menu {
        outline: 2px solid var(--text);
        outline-offset: 4px;
      }

      .checkbox-menu {
        position: fixed;
        z-index: 2;
        inset: 0;
        display: none;
        grid-template-rows: var(--site-header-height) minmax(0, 1fr);
        width: 100vw;
        inline-size: 100vw;
        height: 100vh;
        block-size: 100dvh;
        overflow-x: hidden;
        overflow-y: auto;
        padding-inline: 24px;
        background: var(--surface);

        .menu-header {
          display: flex;
          align-items: center;
          justify-content: flex-end;
          min-height: var(--site-header-height);
        }

        .fullscreen-menu-nav {
          counter-reset: fullscreen-item;
          display: grid;
          align-content: start;
          gap: 0;
          padding-block: 24px;

          a {
            counter-increment: fullscreen-item;
            display: grid;
            grid-template-columns: 3rem minmax(0, 1fr);
            align-items: baseline;
            gap: 24px;
            padding-block: 16px;
            border-bottom: 1px solid var(--line);
            font-size: 5rem;
            font-weight: bold;
            line-height: 1;
            transition:
              background-color 0.2s,
              padding-inline 0.2s;

            &::before {
              content: counter(fullscreen-item, decimal-leading-zero);
              font-size: 1rem;
              line-height: 1;
            }

            @media (any-hover: hover) {
              &:hover {
                background-color: var(--bg);
                padding-inline: 16px;
              }
            }

            @media (width <= 720px) {
              grid-template-columns: 2rem minmax(0, 1fr);
              gap: 16px;
              font-size: 3rem;
            }
          }
        }
      }

      .menu-toggle:checked ~ .checkbox-menu {
        display: grid;
      }
    </style>
  </head>
  <body>
    <!-- NG: the checkbox state is used as the menu state. -->
    <input class="menu-toggle" id="menu-toggle" type="checkbox" />

    <header class="site-header">
      <a class="brand" href="#">Example Website</a>
      <a class="demo-index-link" href="index.html">Demos</a>
      <label class="button-icon button-menu" for="menu-toggle" title="Open menu"></label>
    </header>

    <main>
      <section class="hero">
        <p>NG pattern</p>
        <h1>Checkbox hack fullscreen menu</h1>
        <a href="#">Background link</a>
      </section>

      <section class="summary">
        <h2>Checkbox controls the navigation</h2>
        <p><a href="#">Another background link</a></p>
      </section>

      <div class="scroll-test-space"></div>
    </main>

    <div class="checkbox-menu">
      <header class="menu-header">
        <label class="button-icon button-close" for="menu-toggle" title="Close menu"></label>
      </header>

      <nav class="fullscreen-menu-nav">
        <a href="#"><span>Work</span></a>
        <a href="#"><span>Studio</span></a>
        <a href="#"><span>Services</span></a>
        <a href="#"><span>Contact</span></a>
      </nav>
    </div>
  </body>
</html>
