<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Accordion Menu</title>
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/layout.css" />
    <link rel="stylesheet" href="styles/controls.css" />
    <link rel="stylesheet" href="styles/menu.css" />
    <link rel="stylesheet" href="styles/menu-fullscreen.css" />
    <script src="scripts/menu.js" defer></script>
    <style>
      .menu-accordion-list {
        /* detailsのauto高さアニメーション */
        /* Auto-height animation for details */
        interpolate-size: allow-keywords;

        details {
          border-bottom: 1px solid var(--line);
          padding-block-end: 16px;

          &::details-content {
            block-size: 0;
            overflow: clip;
            transition:
              block-size 0.3s ease,
              content-visibility 0.3s allow-discrete;
          }

          &[open] {
            &::details-content {
              block-size: auto;

              @starting-style {
                block-size: 0;
              }
            }

            summary::after {
              rotate: 90deg;
            }
          }
        }

        summary {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 24px;
          min-width: 0;
          list-style: none;

          &::after {
            /* CSS maskの矢印 */
            /* CSS mask arrow */
            flex: 0 0 auto;
            width: 0.6em;
            height: 0.6em;
            background: currentColor;
            content: "";
            mask: url("assets/icon-chevron-right.svg") center / contain no-repeat;
            transition: rotate 0.2s ease;
          }

          &::-webkit-details-marker {
            display: none;
          }
        }

        .menu-accordion-title {
          min-width: 0;
          overflow-wrap: anywhere;
        }

        a {
          display: block;
          padding-block: 12px;
          padding-inline: 16px;
          border-radius: 8px;
          font-size: 1rem;
          font-weight: normal;
          transition: background-color 0.2s;

          @media (any-hover: hover) {
            &:hover {
              background-color: rgb(32 32 32 / 10%);
            }
          }
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#">Example Website</a>
      <a class="demo-index-link" href="index.html">Demos</a>
      <!-- ハンバーガーメニューボタン -->
      <!-- Hamburger menu button -->
      <button class="button-icon button-menu" id="button-open" title="Open menu"></button>
    </header>

    <main>
      <section class="hero">
        <h1>Accordion Menu</h1>
        <p>A navigation menu with accordion sections.</p>
      </section>

      <!-- スクロール検証用の長い本文 -->
      <!-- Tall content for scroll checks -->
      <div class="scroll-test-space"></div>

      <footer class="demo-footer">
        <small>&copy; 2026 ICS INC.</small>
      </footer>
    </main>

    <!-- アコーディオン型ハンバーガーメニュー本体 -->
    <!-- Accordion hamburger menu panel -->
    <dialog class="menu-dialog menu-full menu-accordion" id="menu">
      <header class="menu-header">
        <button class="button-icon button-close" id="button-close" title="Close menu"></button>
      </header>

      <div class="menu-list menu-list-large menu-accordion-list">
        <details>
          <summary>
            <span class="menu-accordion-title">Residents</span>
          </summary>
          <a href="#">Certificates</a>
          <a href="#">Health services</a>
          <a href="#">Waste collection</a>
        </details>
        <details>
          <summary>
            <span class="menu-accordion-title">Business</span>
          </summary>
          <a href="#">Permits</a>
          <a href="#">Procurement</a>
          <a href="#">Consultation</a>
        </details>
        <details>
          <summary>
            <span class="menu-accordion-title">Visitors</span>
          </summary>
          <a href="#">Access</a>
          <a href="#">Events</a>
          <a href="#">Facilities</a>
        </details>
      </div>
    </dialog>
  </body>
</html>
