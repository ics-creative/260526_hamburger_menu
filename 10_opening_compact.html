<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Opening Pattern: Compact</title>
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/layout.css" />
    <link rel="stylesheet" href="styles/controls.css" />
    <link rel="stylesheet" href="styles/menu.css" />
    <link rel="stylesheet" href="styles/menu-compact.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#intro">Example Website</a>
      <a class="demo-index-link" href="index.html">Demos</a>
      <!-- ハンバーガーメニューボタン -->
      <!-- Hamburger menu button -->
      <button class="button-icon button-menu" popovertarget="compact" title="Open menu"></button>
    </header>

    <main>
      <section class="hero" id="intro">
        <p>Small publication</p>
        <h1>A compact menu for simple pages.</h1>
        <a href="#issues">Read issues</a>
      </section>

      <section class="summary" id="issues">
        <h2>Issues</h2>
        <p>Short essays, interviews, and notes from independent makers.</p>
      </section>

      <section class="summary" id="contact">
        <h2>Contact</h2>
        <p>Send a note through the contact page.</p>
      </section>

      <!-- スクロール検証用の長い本文 -->
      <!-- Tall content for scroll checks -->
      <div class="scroll-test-space"></div>
    </main>

    <!-- コンパクト型ハンバーガーメニュー本体 -->
    <!-- Compact hamburger menu panel -->
    <div class="menu-dialog compact-menu" id="compact" popover>
      <nav class="menu-list">
        <a href="#intro">Intro</a>
        <a href="#issues">Issues</a>
        <a href="#contact">Contact</a>
      </nav>
    </div>

    <script>
      // メニュー内リンク選択時のpopoverクローズ
      // Popover close on menu-link selection
      const menu = document.querySelector("#compact");

      for (const link of menu.querySelectorAll("a[href]")) {
        link.addEventListener("click", () => {
          menu.hidePopover();
        });
      }
    </script>
  </body>
</html>
