<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Search Form Menu</title>
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/layout.css" />
    <link rel="stylesheet" href="styles/controls.css" />
    <link rel="stylesheet" href="styles/menu.css" />
    <link rel="stylesheet" href="styles/menu-fullscreen.css" />
    <link rel="stylesheet" href="styles/menu-extras.css" />
    <script src="scripts/menu.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#">Example Website</a>
      <!-- ハンバーガーメニューボタン -->
      <!-- Hamburger menu button -->
      <button id="button-open" class="button-icon button-menu" title="Menu"></button>
    </header>

    <main>
      <section class="hero">
        <h1>Search Form Menu</h1>
        <p>A navigation menu with search and supporting links.</p>
        <a href="index.html">Back to Index</a>
      </section>

      <!-- スクロール検証用の長い本文 -->
      <!-- Tall content for scroll checks -->
      <div class="scroll-test-space"></div>

      <footer class="demo-footer">
        <small>&copy; 2026 ICS INC.</small>
      </footer>
    </main>

    <!-- 検索付きハンバーガーメニュー本体 -->
    <!-- Search hamburger menu panel -->
    <dialog id="menu" class="menu-dialog menu-full menu-extras">
      <header class="menu-header">
        <button id="button-close" class="button-icon button-close" title="Close"></button>
      </header>

      <form class="menu-search" action="#">
        <label for="menu-search">Search</label>
        <input id="menu-search" type="search" name="q" placeholder="Search docs" />
      </form>

      <nav class="menu-list menu-list-large menu-extras-list">
        <a href="#">Platform</a>
        <a href="#">Pricing</a>
        <a href="#">Support</a>
      </nav>

      <div class="menu-extras-panel">
        <div class="menu-extras-actions">
          <a class="action-button" href="#">Contact</a>
          <a class="action-button" href="#">Download</a>
        </div>

        <div class="social-links">
          <a class="social-link" href="#">
            <img src="assets/icon-linkedin.svg" alt="LinkedIn" />
          </a>
          <a class="social-link" href="#">
            <img src="assets/icon-x.svg" alt="X" />
          </a>
        </div>
      </div>
    </dialog>
  </body>
</html>
